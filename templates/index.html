<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- ── Navbar ──────────────────────────────────────────────── -->
    <header id="toolbar">
        <div class="toolbar-left">
            <span id="userName" class="user-name"></span>
        </div>
        <div class="toolbar-right">
            <button id="btnEditMode" class="btn btn-icon" title="Toggle edit mode">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <div class="notification-container">
                <button id="btnNotifications" class="btn btn-icon" title="Notifications">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span id="notifBadge" class="notif-badge hidden">0</span>
                </button>
                <div id="notifDropdown" class="notif-dropdown hidden"></div>
            </div>
            <a href="/logout" class="btn btn-icon" title="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </a>
        </div>
    </header>

    <!-- ── Floating search bar (below navbar, centered) ─────── -->
    <div id="searchBar">
        <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>
    </div>

    <!-- ── Tree canvas (full viewport) ─────────────────────────── -->
    <div id="mainContent">
        <div id="FamilyChart" class="f3"></div>
    </div>

    <!-- ── Side panel (outside mainContent for proper z-index) ── -->
    <div id="sidePanel" class="side-panel hidden">
        <div class="panel-header">
            <h2 id="panelTitle"></h2>
            <button id="btnClosePanel" class="btn btn-icon panel-close-btn" title="Close">&times;</button>
        </div>
        <div id="panelContent" class="panel-content"></div>
    </div>

    <!-- ── Connector dot popover ───────────────────────────────── -->
    <div id="dotPopover" class="dot-popover hidden">
        <div class="dot-popover-title">Add relative</div>
        <div class="dot-popover-body"></div>
    </div>

    <!-- ── Modals ──────────────────────────────────────────────── -->
    <div id="modalOverlay" class="modal-overlay hidden">
        <div id="modalContent" class="modal-content"></div>
    </div>

    <!-- ── Lightbox ────────────────────────────────────────────── -->
    <div id="lightbox" class="lightbox hidden">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-container">
            <button id="lightboxClose" class="btn btn-icon lightbox-close">&times;</button>
            <div class="lightbox-image-wrapper">
                <img id="lightboxImg" src="" alt="">
                <div id="faceBoxes" class="face-boxes"></div>
            </div>
            <div id="lightboxInfo" class="lightbox-info"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='lib/d3.v7.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tree-layout.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
