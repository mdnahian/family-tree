<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join — Family Tree</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .invite-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
        }
        .invite-card h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
            text-align: center;
        }
        .invite-card .welcome {
            color: #6b7280;
            text-align: center;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .invite-card .person-name {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover {
            background: #1d4ed8;
        }
        .flash-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .hint {
            color: #9ca3af;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <h1>Family Tree</h1>
        <p class="welcome">You've been invited as</p>
        <p class="person-name">{{ person.first_name }} {{ person.last_name or '' }}</p>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="password">Set your password</label>
                <input type="password" id="password" name="password" required minlength="6" autofocus>
                <p class="hint">At least 6 characters</p>
            </div>
            <button type="submit">Get started</button>
        </form>
    </div>
</body>
</html>
